name: build-macos

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPRESS: "true"
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Resolve macOS build settings
        id: macos
        shell: bash
        run: |
          arch="$(uname -m)"

          if [[ "$arch" == "arm64" ]]; then
            echo "cmake_arch=arm64" >> "$GITHUB_OUTPUT"
            echo "skia_arch=arm64" >> "$GITHUB_OUTPUT"
            echo "deployment_target=11.0" >> "$GITHUB_OUTPUT"
            echo "png_arm_neon=on" >> "$GITHUB_OUTPUT"
          else
            echo "cmake_arch=x86_64" >> "$GITHUB_OUTPUT"
            echo "skia_arch=x64" >> "$GITHUB_OUTPUT"
            echo "deployment_target=10.14" >> "$GITHUB_OUTPUT"
            echo "png_arm_neon=off" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Skia
        shell: bash
        run: |
          skia_url=$(bash laf/misc/skia-url.sh release macos "${{ steps.macos.outputs.skia_arch }}")
          skia_file=$(basename "$skia_url")
          curl --fail --location --output "$skia_file" "$skia_url"
          unzip -q "$skia_file" -d skia

      - name: Restore compiler cache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-${{ steps.macos.outputs.skia_arch }}-${{ github.sha }}
          restore-keys: |
            ccache-macos-${{ steps.macos.outputs.skia_arch }}-

      - name: Install ccache
        shell: bash
        run: |
          brew list ccache >/dev/null 2>&1 || brew install ccache

      - name: Install Ninja
        uses: aseprite/get-ninja@main

      - name: Configure CMake
        shell: bash
        run: |
          cmake_args=(
            -S .
            -B build
            -G Ninja
            -DCMAKE_BUILD_TYPE=RelWithDebInfo
            -DCMAKE_OSX_ARCHITECTURES=${{ steps.macos.outputs.cmake_arch }}
            -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ steps.macos.outputs.deployment_target }}
            -DCMAKE_OSX_SYSROOT=$(xcrun --sdk macosx --show-sdk-path)
            -DENABLE_TESTS=ON
            -DENABLE_SCRIPTING=ON
            -DENABLE_CCACHE=ON
            -DLAF_BACKEND=skia
            -DSKIA_DIR=$PWD/skia
            -DSKIA_LIBRARY_DIR=$PWD/skia/out/Release-${{ steps.macos.outputs.skia_arch }}
            -DSKIA_LIBRARY=$PWD/skia/out/Release-${{ steps.macos.outputs.skia_arch }}/libskia.a
          )

          if [[ "${{ steps.macos.outputs.png_arm_neon }}" == "on" ]]; then
            cmake_args+=(-DPNG_ARM_NEON:STRING=on)
          fi

          cmake "${cmake_args[@]}"

      - name: Build project
        shell: bash
        run: |
          cmake --build build --parallel

      - name: Show ccache stats
        shell: bash
        run: |
          ccache --show-stats || true

      - name: Run C++ tests
        shell: bash
        run: |
          ctest --test-dir build --output-on-failure

      - name: Run CLI tests
        shell: bash
        run: |
          export ASEPRITE="$PWD/build/bin/aseprite"
          cd tests
          bash run-tests.sh

      - name: Generate bundle icons
        shell: bash
        run: |
          make_icns() {
            local prefix="$1"
            local source_512="$2"
            local source_256="$3"
            local output="$4"
            local iconset

            iconset="$(mktemp -d)/${prefix}.iconset"
            mkdir -p "$iconset"

            sips -z 16 16 "$source_256" --out "$iconset/icon_16x16.png" >/dev/null
            sips -z 32 32 "$source_256" --out "$iconset/icon_16x16@2x.png" >/dev/null
            sips -z 32 32 "$source_256" --out "$iconset/icon_32x32.png" >/dev/null
            sips -z 64 64 "$source_256" --out "$iconset/icon_32x32@2x.png" >/dev/null
            sips -z 128 128 "$source_256" --out "$iconset/icon_128x128.png" >/dev/null
            sips -z 256 256 "$source_256" --out "$iconset/icon_128x128@2x.png" >/dev/null
            sips -z 256 256 "$source_256" --out "$iconset/icon_256x256.png" >/dev/null
            sips -z 512 512 "$source_512" --out "$iconset/icon_256x256@2x.png" >/dev/null
            sips -z 512 512 "$source_512" --out "$iconset/icon_512x512.png" >/dev/null
            sips -z 1024 1024 "$source_512" --out "$iconset/icon_512x512@2x.png" >/dev/null

            iconutil -c icns "$iconset" -o "$output"
          }

          resources_dir="build/bin/Aseprite.app/Contents/Resources"
          mkdir -p "$resources_dir"

          make_icns "aseprite" "data/icons/hd/asehd.png" "data/icons/ase256.png" "$resources_dir/Aseprite.icns"
          make_icns "document" "data/icons/doc256.png" "data/icons/doc256.png" "$resources_dir/Document.icns"
          make_icns "extension" "data/icons/ext256.png" "data/icons/ext256.png" "$resources_dir/Extension.icns"

      - name: Sign app bundle
        shell: bash
        run: |
          codesign --force --deep --sign - --timestamp=none build/bin/Aseprite.app

      - name: Verify app signature
        shell: bash
        run: |
          codesign --verify --deep --strict --verbose=2 build/bin/Aseprite.app

      - name: Package app bundle
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent build/bin/Aseprite.app aseprite-macos-app.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: aseprite-macos-app
          path: aseprite-macos-app.zip
          retention-days: 14
